<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 820" font-family="Inter, system-ui, sans-serif">
  <defs>
    <clipPath id="frame"><rect width="760" height="820" rx="14"/></clipPath>
    <pattern id="tsunami" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="9" height="9" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="9" stroke="#cc2200" stroke-width="2" opacity="0.5"/>
    </pattern>
  </defs>

  <g clip-path="url(#frame)">
    <!-- LAND base (cream) -->
    <rect width="760" height="820" fill="#efe9dc"/>

    <!-- ===== FOREST / TERRAIN AREAS ===== -->
    <g fill="#bcd1a6">
      <!-- Olympic -->
      <path d="M196 96 C236 84 270 104 268 138 C266 172 226 188 198 176 C170 164 162 110 196 96 Z"/>
      <!-- North Cascades (WA) -->
      <path d="M376 92 C440 80 488 104 476 150 C466 190 410 196 380 178 C352 160 336 104 376 92 Z"/>
      <!-- NE WA highlands -->
      <path d="M548 110 C606 100 648 120 640 156 C632 190 584 196 556 182 C530 168 510 120 548 110 Z" opacity="0.9"/>
      <!-- Coast Range (long, along coast) -->
      <path d="M176 196 C214 188 222 250 210 320 C200 386 220 470 198 556 C184 614 156 612 156 540 C156 460 168 400 162 330 C158 268 150 206 176 196 Z" opacity="0.92"/>
      <!-- Cascade belt (central spine, WA->OR) -->
      <path d="M372 196 C432 188 446 280 430 370 C416 452 440 560 416 656 C402 706 360 706 356 632 C352 540 372 470 364 388 C358 312 338 206 372 196 Z"/>
      <!-- Blue Mountains (NE OR) -->
      <path d="M548 396 C612 384 654 414 642 456 C632 494 580 500 552 484 C526 468 512 410 548 396 Z" opacity="0.92"/>
      <!-- Ochoco / Deschutes (central OR) -->
      <path d="M452 470 C506 460 528 502 512 540 C498 574 456 576 436 556 C418 538 416 482 452 470 Z" opacity="0.85"/>
      <!-- Klamath / Siskiyou (SW OR) -->
      <path d="M186 660 C250 648 300 672 292 712 C284 748 220 752 190 736 C164 722 150 672 186 660 Z"/>
    </g>
    <!-- denser forest cores -->
    <g fill="#a7c08a" opacity="0.8">
      <path d="M392 240 C424 234 432 300 420 360 C410 412 426 470 410 520 C400 552 380 548 380 500 C380 430 396 380 390 320 C386 286 372 246 392 240 Z"/>
      <path d="M196 260 C218 254 222 320 214 380 C208 426 218 480 206 520 C198 544 184 540 184 500 C184 440 192 396 190 340 C188 308 178 266 196 260 Z"/>
    </g>

    <!-- ===== OCEAN ===== -->
    <path d="M-20 -20 L-20 840 L150 780 C140 700 162 640 144 560 C128 488 160 430 140 350 C124 282 160 232 142 168 C128 120 150 80 150 40 L150 -20 Z" fill="#bcdce8"/>
    <text x="62" y="430" transform="rotate(-90 62 430)" text-anchor="middle" fill="#7aa7ba" font-size="15" font-weight="700" letter-spacing="6">PACIFIC OCEAN</text>

    <!-- TSUNAMI INUNDATION ZONE (coastal hazard band) -->
    <path d="M150 40 C150 80 128 120 142 168 C160 232 124 282 142 350 C160 430 128 488 144 560 C162 640 140 700 150 780" fill="none" stroke="url(#tsunami)" stroke-width="16" stroke-linecap="butt"/>
    <path d="M150 40 C150 80 128 120 142 168 C160 232 124 282 142 350 C160 430 128 488 144 560 C162 640 140 700 150 780" fill="none" stroke="#cc2200" stroke-width="1.4" opacity="0.7"/>

    <!-- ===== RIVERS ===== -->
    <g stroke="#7fb9d4" fill="none" stroke-linecap="round">
      <path d="M150 386 C320 372 480 380 700 366" stroke-width="2.6"/>          <!-- Columbia (border) -->
      <path d="M300 360 C236 372 188 392 150 416" stroke-width="2.6"/>          <!-- lower Columbia -->
      <path d="M292 432 C300 480 286 540 286 600" stroke-width="1.8"/>          <!-- Willamette -->
      <path d="M520 360 C560 420 600 470 660 520" stroke-width="2" opacity="0.85"/> <!-- Snake-ish -->
    </g>
    <text x="470" y="378" text-anchor="middle" fill="#5d93ab" font-size="9.5" font-weight="600" letter-spacing="1" transform="rotate(-3 470 378)">COLUMBIA RIVER</text>

    <!-- ===== STATE BORDERS ===== -->
    <g stroke="#b0a487" stroke-width="1.6" fill="none" stroke-dasharray="7 5">
      <path d="M150 60 L700 60"/>
      <path d="M694 60 L694 740"/>
      <path d="M150 720 L694 720"/>
    </g>

    <!-- ===== ROADS ===== -->
    <!-- minor roads -->
    <g stroke="#d8cbb0" stroke-width="1.6" fill="none" stroke-linecap="round">
      <path d="M300 360 C232 386 184 410 126 432"/>
      <path d="M292 432 C360 458 432 474 474 498"/>
      <path d="M318 180 C400 214 470 232 540 232"/>
      <path d="M286 520 C360 544 440 540 540 520"/>
      <path d="M470 232 C520 300 560 360 612 420"/>
    </g>
    <!-- US highways (orange) -->
    <path d="M150 70 C138 200 150 330 140 450 C132 570 150 670 146 760" fill="none" stroke="#e0913f" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Interstates (red) -->
    <g fill="none" stroke="#d8472f" stroke-width="3.4" stroke-linecap="round">
      <path d="M318 56 L318 180 C310 260 300 320 300 360 C294 392 292 414 292 432 C287 476 286 498 286 520 C288 588 290 640 290 712"/>
      <path d="M318 180 C420 196 520 188 694 196"/>
      <path d="M300 360 C384 372 462 372 540 404 C594 426 626 452 672 476"/>
    </g>

    <!-- highway shields -->
    <g font-weight="800">
      <g transform="translate(300 300)"><rect x="-12" y="-10" width="24" height="20" rx="4" fill="#fff" stroke="#d8472f" stroke-width="1.6"/><text x="0" y="5" text-anchor="middle" fill="#b53a26" font-size="12">5</text></g>
      <g transform="translate(486 191)"><rect x="-14" y="-10" width="28" height="20" rx="4" fill="#fff" stroke="#d8472f" stroke-width="1.6"/><text x="0" y="5" text-anchor="middle" fill="#b53a26" font-size="11.5">90</text></g>
      <g transform="translate(516 420)"><rect x="-14" y="-10" width="28" height="20" rx="4" fill="#fff" stroke="#d8472f" stroke-width="1.6"/><text x="0" y="5" text-anchor="middle" fill="#b53a26" font-size="11.5">84</text></g>
      <g transform="translate(150 250)"><rect x="-16" y="-10" width="32" height="20" rx="4" fill="#fff" stroke="#e0913f" stroke-width="1.6"/><text x="0" y="5" text-anchor="middle" fill="#c47322" font-size="11">101</text></g>
    </g>

    <!-- ===== CASCADIA SUBDUCTION ZONE (offshore, emphasized) ===== -->
    <path d="M84 100 C66 240 96 380 78 510 C62 610 92 690 80 770" fill="none" stroke="#cc2200" stroke-width="2.6" opacity="0.25"/>
    <path d="M84 100 C66 240 96 380 78 510 C62 610 92 690 80 770" fill="none" stroke="#cc2200" stroke-width="3.4" stroke-dasharray="12 8" stroke-linecap="round"/>
    <g transform="translate(38 610)"><text transform="rotate(-90)" text-anchor="middle" fill="#b21e00" font-size="11.5" font-weight="800" letter-spacing="2">CASCADIA SUBDUCTION ZONE</text></g>

    <!-- ===== STATE NAMES (faint) ===== -->
    <text x="556" y="150" text-anchor="middle" fill="#cdc3a8" font-size="33" font-weight="800" font-family="'Playfair Display', Georgia, serif" letter-spacing="3">WASHINGTON</text>
    <text x="556" y="600" text-anchor="middle" fill="#cdc3a8" font-size="33" font-weight="800" font-family="'Playfair Display', Georgia, serif" letter-spacing="3">OREGON</text>

    <!-- ===== VOLCANOES (emphasized hazard) ===== -->
    <g stroke="#7a1500" stroke-width="1.6" fill="#cc2200" stroke-linejoin="round">
      <path d="M430 86 l9 16 -18 0 z"/>
      <path d="M432 168 l11 19 -22 0 z"/>
      <path d="M402 250 l9 16 -18 0 z"/>
      <path d="M460 250 l9 16 -18 0 z"/>
      <path d="M360 372 l11 19 -22 0 z"/>
      <path d="M382 440 l9 16 -18 0 z"/>
      <path d="M404 502 l9 16 -18 0 z"/>
      <path d="M360 644 l10 17 -20 0 z"/>
    </g>
    <g fill="#7a1500" font-size="10.5" font-weight="700">
      <text x="444" y="90">Mt. Baker</text>
      <text x="448" y="180">Mt. Rainier</text>
      <text x="394" y="246" text-anchor="end">St. Helens</text>
      <text x="472" y="262">Mt. Adams</text>
      <text x="376" y="378">Mt. Hood</text>
      <text x="396" y="446">Jefferson</text>
      <text x="418" y="514">Three Sisters</text>
      <text x="374" y="650">Crater Lake</text>
    </g>

    <!-- ===== CITIES ===== -->
    <g font-family="Inter, sans-serif">
      <!-- Portland (highlighted) -->
      <g transform="translate(300 360)"><circle r="11" fill="#cc2200" opacity="0.16"/><circle r="5" fill="#cc2200"/><circle r="5" fill="none" stroke="#7a1500" stroke-width="1.3"/></g>
      <text x="312" y="356" fill="#222" font-size="14.5" font-weight="800">Portland</text>
      <!-- others -->
      <g fill="#2b2b2b">
        <circle cx="318" cy="180" r="4"/><circle cx="612" cy="190" r="3.4"/>
        <circle cx="300" cy="232" r="3"/><circle cx="292" cy="432" r="3.4"/>
        <circle cx="286" cy="520" r="3.4"/><circle cx="472" cy="520" r="3.4"/>
        <circle cx="470" cy="232" r="3"/><circle cx="560" cy="404" r="3"/>
        <circle cx="150" cy="300" r="2.8"/><circle cx="140" cy="470" r="2.8"/>
        <circle cx="250" cy="712" r="3"/>
      </g>
      <g fill="#333" font-size="11.5" font-weight="600">
        <text x="308" y="176" text-anchor="end">Seattle</text>
        <text x="602" y="194" text-anchor="end">Spokane</text>
        <text x="290" y="228" text-anchor="end">Olympia</text>
        <text x="302" y="436">Salem</text>
        <text x="296" y="524">Eugene</text>
        <text x="482" y="524">Bend</text>
        <text x="480" y="228">Yakima</text>
        <text x="570" y="408">Pendleton</text>
      </g>
      <g fill="#666" font-size="10" font-weight="500">
        <text x="160" y="304">Astoria</text>
        <text x="150" y="474">Newport</text>
        <text x="260" y="716">Medford</text>
      </g>
    </g>
  </g>

  <!-- panel border -->
  <rect x="0.5" y="0.5" width="759" height="819" rx="14" fill="none" stroke="#cabfa4" stroke-width="1.4"/>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(28 716)" font-size="11" font-weight="600">
    <rect x="-12" y="-20" width="320" height="78" rx="9" fill="#fbf8f1" stroke="#cabfa4" stroke-width="1.2"/>
    <text x="-2" y="-4" fill="#7a1500" font-size="11" font-weight="800" letter-spacing="1.5">HAZARDS</text>
    <line x1="0" y1="14" x2="24" y2="14" stroke="#cc2200" stroke-width="3.2" stroke-dasharray="7 5"/>
    <text x="32" y="18" fill="#444">Cascadia fault</text>
    <path d="M6 30 l8 14 -16 0 z" fill="#cc2200" stroke="#7a1500" stroke-width="1.4"/>
    <text x="32" y="44" fill="#444">Active volcano</text>
    <rect x="148" y="8" width="22" height="12" fill="url(#tsunami)" stroke="#cc2200" stroke-width="0.8"/>
    <text x="178" y="18" fill="#444">Tsunami zone</text>
    <line x1="148" y1="38" x2="170" y2="38" stroke="#d8472f" stroke-width="3.2"/>
    <text x="178" y="42" fill="#444">Interstate</text>
  </g>

  <!-- title + compass -->
  <g transform="translate(560 40)">
    <rect x="-12" y="-22" width="190" height="40" rx="8" fill="#fbf8f1" stroke="#cabfa4" stroke-width="1.2"/>
    <text x="0" y="-6" fill="#222" font-size="13" font-weight="800" font-family="'Playfair Display', Georgia, serif">Pacific Northwest</text>
    <text x="0" y="9" fill="#7a1500" font-size="9.5" font-weight="700" letter-spacing="2">HAZARD MAP</text>
  </g>
  <g transform="translate(706 96)">
    <circle r="19" fill="#fbf8f1" stroke="#cabfa4" stroke-width="1.2"/>
    <path d="M0 -13 L4.5 4 L0 0 L-4.5 4 Z" fill="#cc2200"/>
    <text x="0" y="-22" text-anchor="middle" fill="#7a6f57" font-size="10.5" font-weight="800">N</text>
  </g>
</svg>
