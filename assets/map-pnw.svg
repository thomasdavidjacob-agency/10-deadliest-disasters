<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 820" font-family="Inter, system-ui, sans-serif">
  <defs>
    <clipPath id="frame"><rect x="0" y="0" width="760" height="820" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- LAND base -->
    <rect width="760" height="820" fill="#232a32"/>

    <!-- Cascade forest belt -->
    <path d="M322 -20 C360 220 344 470 360 740 L470 740 C452 470 472 220 432 -20 Z" fill="#1f2c23" opacity="0.85"/>
    <path d="M150 -20 C150 200 150 470 150 740 L300 740 C300 470 300 220 300 -20 Z" fill="#212a25" opacity="0.5"/>

    <!-- OCEAN -->
    <path d="M-20 -20 L-20 840 L150 740 C140 690 158 650 142 600 C128 555 156 510 138 460 C122 415 158 380 140 330 C124 285 156 245 140 195 C126 150 152 110 150 60 L150 -20 Z" fill="#15252d"/>
    <text x="60" y="430" transform="rotate(-90 60 430)" text-anchor="middle" fill="#34525e" font-size="15" font-weight="700" letter-spacing="6">PACIFIC OCEAN</text>

    <!-- ===== STATE BORDERS (thin dashed) ===== -->
    <g stroke="#3c434d" stroke-width="1.4" fill="none" stroke-dasharray="6 5">
      <path d="M150 62 L700 62"/>            <!-- WA / Canada -->
      <path d="M690 62 L690 740"/>           <!-- east border -->
      <path d="M150 720 L690 720"/>          <!-- OR / CA-NV -->
    </g>

    <!-- Columbia River (WA/OR border) + lower Columbia to coast -->
    <g stroke="#2f5663" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9">
      <path d="M150 398 C320 384 480 392 690 376"/>
      <path d="M300 405 C238 402 188 416 150 432"/>
    </g>
    <text x="600" y="368" text-anchor="end" fill="#3f6470" font-size="10" font-weight="600" letter-spacing="1">COLUMBIA RIVER</text>

    <!-- ===== MINOR ROADS ===== -->
    <g stroke="#39414c" stroke-width="1.6" fill="none" stroke-linecap="round">
      <path d="M300 408 C230 430 180 452 122 470"/>     <!-- US-26 Portland->coast -->
      <path d="M290 472 C360 500 430 516 472 540"/>     <!-- OR-22/US-20 Salem->Bend -->
      <path d="M318 196 C400 232 470 250 540 250"/>     <!-- WA cross -->
      <path d="M282 560 C360 580 440 576 540 556"/>     <!-- Eugene east -->
      <path d="M612 196 C636 320 628 470 600 600"/>     <!-- east N-S -->
      <path d="M348 300 C440 322 520 330 612 300"/>
    </g>

    <!-- ===== HIGHWAYS ===== -->
    <!-- US-101 (coastal) -->
    <path d="M150 84 C138 200 150 320 140 440 C132 560 150 660 146 726" fill="none" stroke="#9c8552" stroke-width="3" stroke-linecap="round"/>
    <!-- Interstates (amber) -->
    <g fill="none" stroke="#d4930a" stroke-width="4" stroke-linecap="round">
      <path d="M318 96 L318 196 C310 280 300 350 300 408 C294 440 290 452 290 472 C285 512 282 536 282 560 C284 624 286 664 286 712"/> <!-- I-5 -->
      <path d="M318 196 C420 188 520 192 690 198"/>   <!-- I-90 -->
      <path d="M300 408 C384 396 462 402 540 432 C592 452 624 472 668 492"/> <!-- I-84 -->
    </g>

    <!-- ===== HIGHWAY SHIELDS ===== -->
    <!-- I-5 -->
    <g transform="translate(300 330)">
      <rect x="-13" y="-11" width="26" height="22" rx="5" fill="#d4930a"/>
      <text x="0" y="5" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="800">5</text>
    </g>
    <!-- I-90 -->
    <g transform="translate(486 191)">
      <rect x="-15" y="-11" width="30" height="22" rx="5" fill="#d4930a"/>
      <text x="0" y="5" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="800">90</text>
    </g>
    <!-- I-84 -->
    <g transform="translate(516 446)">
      <rect x="-15" y="-11" width="30" height="22" rx="5" fill="#d4930a"/>
      <text x="0" y="5" text-anchor="middle" fill="#1a1a1a" font-size="12.5" font-weight="800">84</text>
    </g>
    <!-- US-101 -->
    <g transform="translate(150 250)">
      <rect x="-17" y="-11" width="34" height="22" rx="4" fill="#0f1418" stroke="#9c8552" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#cdb98a" font-size="11.5" font-weight="800">101</text>
    </g>

    <!-- ===== CASCADIA SUBDUCTION ZONE (offshore) ===== -->
    <path d="M86 110 C70 240 96 380 80 500 C66 600 92 680 80 760" fill="none" stroke="#cc2200" stroke-width="2.6" stroke-dasharray="10 7" stroke-linecap="round"/>
    <g transform="translate(40 600)"><text transform="rotate(-90)" text-anchor="middle" fill="#ff6a4a" font-size="11" font-weight="700" letter-spacing="2">CASCADIA SUBDUCTION ZONE</text></g>

    <!-- ===== VOLCANOES ===== -->
    <g stroke="#ffb24a" stroke-width="2" fill="#2a2114" stroke-linejoin="round">
      <path d="M410 152 l12 21 -24 0 z"/>
      <path d="M382 296 l11 19 -22 0 z"/>
      <path d="M346 430 l12 21 -24 0 z"/>
    </g>
    <text x="426" y="160" fill="#e8cfa0" font-size="11.5" font-weight="600">Mt. Rainier</text>
    <text x="370" y="292" text-anchor="end" fill="#e8cfa0" font-size="11.5" font-weight="600">Mt. St. Helens</text>
    <text x="364" y="446" fill="#e8cfa0" font-size="11.5" font-weight="600">Mt. Hood</text>

    <!-- ===== CITIES ===== -->
    <!-- big state labels -->
    <text x="560" y="150" text-anchor="middle" fill="#3a424c" font-size="34" font-weight="800" font-family="'Playfair Display', Georgia, serif" letter-spacing="3">WASHINGTON</text>
    <text x="560" y="600" text-anchor="middle" fill="#3a424c" font-size="34" font-weight="800" font-family="'Playfair Display', Georgia, serif" letter-spacing="3">OREGON</text>

    <!-- Seattle -->
    <circle cx="318" cy="196" r="4.5" fill="#f0ece4" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="308" y="190" text-anchor="end" fill="#cfc9bd" font-size="12.5" font-weight="700">Seattle</text>
    <!-- Spokane -->
    <circle cx="612" cy="200" r="3.6" fill="#cfc9bd"/>
    <text x="600" y="204" text-anchor="end" fill="#9a948a" font-size="11" font-weight="600">Spokane</text>
    <!-- Portland (highlight) -->
    <g transform="translate(300 408)">
      <circle r="11" fill="#cc2200" opacity="0.16"/>
      <circle r="5" fill="#cc2200"/>
      <circle r="5" fill="none" stroke="#ff6a4a" stroke-width="1.3"/>
    </g>
    <text x="312" y="404" fill="#f0ece4" font-size="14.5" font-weight="700">Portland</text>
    <!-- Salem -->
    <circle cx="290" cy="472" r="3.4" fill="#cfc9bd"/>
    <text x="300" y="476" fill="#9a948a" font-size="11" font-weight="600">Salem</text>
    <!-- Eugene -->
    <circle cx="282" cy="560" r="3.4" fill="#cfc9bd"/>
    <text x="292" y="564" fill="#9a948a" font-size="11" font-weight="600">Eugene</text>
    <!-- Bend -->
    <circle cx="472" cy="540" r="3.4" fill="#cfc9bd"/>
    <text x="482" y="544" fill="#9a948a" font-size="11" font-weight="600">Bend</text>
    <!-- coastal towns (tsunami zone) -->
    <circle cx="150" cy="432" r="2.8" fill="#9a948a"/>
    <text x="160" y="436" fill="#7c766b" font-size="10" font-weight="500">Astoria</text>
    <circle cx="140" cy="560" r="2.8" fill="#9a948a"/>
    <text x="150" y="564" fill="#7c766b" font-size="10" font-weight="500">Newport</text>
  </g>

  <!-- panel border -->
  <rect x="0.5" y="0.5" width="759" height="819" rx="14" fill="none" stroke="#2a2e34" stroke-width="1"/>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(458 690)" font-size="11" font-weight="600">
    <rect x="-14" y="-18" width="292" height="62" rx="8" fill="#15181d" stroke="#2a2e34" stroke-width="1"/>
    <line x1="0" y1="0" x2="24" y2="0" stroke="#cc2200" stroke-width="2.6" stroke-dasharray="6 5"/>
    <text x="32" y="4" fill="#9a948a">Cascadia fault</text>
    <line x1="150" y1="0" x2="174" y2="0" stroke="#d4930a" stroke-width="4"/>
    <text x="182" y="4" fill="#9a948a">Interstate</text>
    <path d="M6 22 l8 14 -16 0 z" fill="#2a2114" stroke="#ffb24a" stroke-width="1.6"/>
    <text x="32" y="30" fill="#9a948a">Active volcano</text>
    <circle cx="158" cy="30" r="4.5" fill="#cc2200"/>
    <text x="182" y="34" fill="#9a948a">Major city</text>
  </g>

  <!-- compass -->
  <g transform="translate(700 92)">
    <circle r="20" fill="#15181d" stroke="#2a2e34" stroke-width="1.2"/>
    <path d="M0 -14 L4.5 4 L0 0 L-4.5 4 Z" fill="#d4930a"/>
    <text x="0" y="-23" text-anchor="middle" fill="#8c867b" font-size="11" font-weight="700">N</text>
  </g>
</svg>
